services:
  redpanda:
    image: docker.io/redpandadata/redpanda:latest
    container_name: redpanda
    command:
      - redpanda
      - start
      - --kafka-addr internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr internal://redpanda:9092,external://localhost:19092
      - --pandaproxy-addr internal://0.0.0.0:8082,external://0.0.0.0:18082
      - --advertise-pandaproxy-addr internal://redpanda:8082,external://localhost:18082
      - --schema-registry-addr internal://0.0.0.0:8081,external://0.0.0.0:18081
      - --rpc-addr redpanda:33145
      - --advertise-rpc-addr redpanda:33145
      - --mode dev-container
      - --smp 1
      - --default-log-level=info
    ports:
      - "19092:19092" # Kafka API (from the host)
      - "18081:18081" # Schema registry
      - "18082:18082" # HTTP proxy
      - "19644:9644"  # Admin API
    volumes:
      - redpanda-data:/var/lib/redpanda/data

  redpanda-console:
    image: docker.io/redpandadata/console:latest
    container_name: redpanda-console
    entrypoint: /bin/sh
    command: -c 'echo "$$CONSOLE_CONFIG_FILE" > /tmp/config.yml; /app/console'
    environment:
      CONFIG_FILEPATH: /tmp/config.yml
      CONSOLE_CONFIG_FILE: |
        kafka:
          brokers: ["redpanda:9092"]
    ports:
      - "8085:8080" # Browse topics/messages at http://localhost:8085
    depends_on:
      - redpanda

  azurite:
    image: mcr.microsoft.com/azure-storage/azurite:latest
    container_name: azurite
    command: "azurite --blobHost 0.0.0.0 --queueHost 0.0.0.0 --tableHost 0.0.0.0 --location /data --loose --skipApiVersionCheck"
    volumes:
      - azurite-data:/data
    ports:
      - "10000:10000" # Blob service
      - "10001:10001" # Queue service
      - "10002:10002" # Table service
    healthcheck:
      test: nc 127.0.0.1 10000 -z
      interval: 2s
      retries: 20

  azurite-init:
    image: mcr.microsoft.com/azure-cli:latest
    container_name: azurite-init
    depends_on:
      azurite:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command: >
      "az storage container create --name loki-chunks --connection-string \"$$AZURE_STORAGE_CONNECTION_STRING\" &&
       az storage container create --name mimir-blocks --connection-string \"$$AZURE_STORAGE_CONNECTION_STRING\" &&
       az storage container create --name mimir-ruler --connection-string \"$$AZURE_STORAGE_CONNECTION_STRING\" &&
       az storage container create --name tempo-traces --connection-string \"$$AZURE_STORAGE_CONNECTION_STRING\""
    environment:
      - AZURE_STORAGE_CONNECTION_STRING=DefaultEndpointsProtocol=http;AccountName=devstoreaccount1;AccountKey=Eby8vdM02xNOcqFlqUwJPLlmEtlCDXJ1OUzFT50uSRZ6IFsuFq2UVErCz4I6tq/K1SZFPTOtr/KBHBeksoGMGw==;BlobEndpoint=http://azurite:10000/devstoreaccount1;

  azurite-ui:
    build:
      context: https://github.com/adrianhall/azurite-ui.git#main
      dockerfile: Dockerfile
    container_name: azurite-ui
    restart: unless-stopped
    ports:
      - "8086:8080" # http://localhost:8086 - przeglądanie kontenerów/blobów Azurite
    depends_on:
      azurite:
        condition: service_healthy
    volumes:
      - azurite-ui-data:/app/data # cache SQLite azurite-ui
    environment:
      - ConnectionStrings__Azurite=DefaultEndpointsProtocol=http;AccountName=devstoreaccount1;AccountKey=Eby8vdM02xNOcqFlqUwJPLlmEtlCDXJ1OUzFT50uSRZ6IFsuFq2UVErCz4I6tq/K1SZFPTOtr/KBHBeksoGMGw==;BlobEndpoint=http://azurite:10000/devstoreaccount1;
      - ConnectionStrings__CacheDatabase=Data Source=/app/data/cache.db;Mode=ReadWriteCreate;Cache=Shared;Foreign Keys=True;
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8080

  # Redis - używany przez ServiceB do prostego licznika przetworzonych zamówień.
  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

  # Redis Commander - lekki webowy podgląd kluczy/wartości Redisa.
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: redis-commander
    environment:
      - REDIS_HOSTS=local:redis:6379
    ports:
      - "8087:8081" # http://localhost:8087 - przeglądanie kluczy Redisa
    depends_on:
      - redis

  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: otel-collector
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ./observability/otel-collector-config.yaml:/etc/otel-collector-config.yaml
    ports:
      - "4317:4317" # OTLP gRPC receiver (used by the 4 services)
      - "4318:4318" # OTLP HTTP receiver
    depends_on:
      - tempo
      - loki
      - mimir

  tempo:
    image: docker.io/grafana/tempo:2.6.1
    container_name: tempo
    command: ["-config.file=/etc/tempo.yaml"]
    volumes:
      - ./observability/tempo.yaml:/etc/tempo.yaml
      - tempo-data:/var/tempo # tylko WAL/scratch - trace'y po flushu lądują w Azurite
    ports:
      - "3200:3200" # Tempo query API
    depends_on:
      azurite-init:
        condition: service_completed_successfully

  loki:
    image: grafana/loki:latest
    container_name: loki
    command: -config.file=/etc/loki-config.yaml
    volumes:
      - ./observability/loki-config.yaml:/etc/loki-config.yaml
      - loki-data:/tmp/loki # tylko WAL/cache - chunki i indeks lądują w Azurite
    ports:
      - "3100:3100"
    depends_on:
      azurite-init:
        condition: service_completed_successfully

  mimir:
    image: grafana/mimir:latest
    container_name: mimir
    command: ["-config.file=/etc/mimir.yaml"]
    volumes:
      - ./observability/mimir.yaml:/etc/mimir.yaml
      - mimir-data:/tmp/mimir # tylko sync/scratch - bloki lądują w Azurite
    ports:
      - "9009:9009"
    depends_on:
      azurite-init:
        condition: service_completed_successfully

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000" # http://localhost:3000 (admin/admin)
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - loki
      - tempo
      - mimir

  service-a:
    build:
      context: .
      dockerfile: ServiceA/Dockerfile
    container_name: service-a
    ports:
      - "8081:8080" # POST http://localhost:8081/orders
    environment:
      - Kafka__BootstrapServers=redpanda:9092
      - Otel__Endpoint=http://otel-collector:4317
    depends_on:
      - redpanda
      - otel-collector

  service-b:
    build:
      context: .
      dockerfile: ServiceB/Dockerfile
    container_name: service-b
    ports:
      - "8082:8080"
    environment:
      - Kafka__BootstrapServers=redpanda:9092
      - Otel__Endpoint=http://otel-collector:4317
      - Redis__ConnectionString=redis:6379
    depends_on:
      - redpanda
      - otel-collector
      - redis

  service-c:
    build:
      context: .
      dockerfile: ServiceC/Dockerfile
    container_name: service-c
    ports:
      - "8083:8080"
    environment:
      - Kafka__BootstrapServers=redpanda:9092
      - Otel__Endpoint=http://otel-collector:4317
      - ServiceD__BaseUrl=http://service-d:8080
    depends_on:
      - redpanda
      - otel-collector
      - service-d

  service-d:
    build:
      context: .
      dockerfile: ServiceD/Dockerfile
    container_name: service-d
    ports:
      - "8084:8080"
    environment:
      - Otel__Endpoint=http://otel-collector:4317
    depends_on:
      - otel-collector

volumes:
  redpanda-data:
  azurite-data:
  azurite-ui-data:
  redis-data:
  tempo-data:
  loki-data:
  mimir-data:
