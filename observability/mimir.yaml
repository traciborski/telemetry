# Single-instance Grafana Mimir config using local filesystem storage.
# Based on the official "get started" monolithic-mode example from the Mimir docs.
# Do not use this configuration in production - it is for demonstration/POC purposes only.
multitenancy_enabled: true

blocks_storage:
  backend: azure
  azure:
    # account_name musi być podany jawnie - wewnętrzna walidacja objstore/azure
    # wymaga go zawsze, nawet gdy connection_string też zawiera AccountName.
    account_name: devstoreaccount1
    connection_string: DefaultEndpointsProtocol=http;AccountName=devstoreaccount1;AccountKey=Eby8vdM02xNOcqFlqUwJPLlmEtlCDXJ1OUzFT50uSRZ6IFsuFq2UVErCz4I6tq/K1SZFPTOtr/KBHBeksoGMGw==;BlobEndpoint=http://azurite:10000/devstoreaccount1;
    container_name: mimir-blocks
  bucket_store:
    sync_dir: /tmp/mimir/tsdb-sync
  tsdb:
    dir: /tmp/mimir/tsdb

compactor:
  data_dir: /tmp/mimir/compactor
  sharding_ring:
    kvstore:
      store: memberlist

distributor:
  ring:
    instance_addr: 127.0.0.1
    kvstore:
      store: memberlist

ingester:
  ring:
    instance_addr: 127.0.0.1
    kvstore:
      store: memberlist
    replication_factor: 1

ruler_storage:
  backend: azure
  azure:
    account_name: devstoreaccount1
    connection_string: DefaultEndpointsProtocol=http;AccountName=devstoreaccount1;AccountKey=Eby8vdM02xNOcqFlqUwJPLlmEtlCDXJ1OUzFT50uSRZ6IFsuFq2UVErCz4I6tq/K1SZFPTOtr/KBHBeksoGMGw==;BlobEndpoint=http://azurite:10000/devstoreaccount1;
    container_name: mimir-ruler

server:
  http_listen_port: 9009
  log_level: error

store_gateway:
  sharding_ring:
    replication_factor: 1

# Domyślny bucket-client usage-stats wymaga account_name wprost (nie akceptuje
# samego connection_string) - w tym POC telemetria anonimowa i tak jest zbędna.
usage_stats:
  enabled: false
